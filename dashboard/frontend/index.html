<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORENSIC INTELLIGENCE — ENRON CASE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #070a0f;
  --bg-panel:      #0c1018;
  --bg-elevated:   #131b26;
  --bg-hover:      #192233;
  --border-dim:    #182030;
  --border:        #1e2d42;
  --border-bright: #2a3f5c;
  --text-faint:    #2d4060;
  --text-dim:      #4a6080;
  --text:          #8fa8c0;
  --text-bright:   #d4e4f0;
  --amber:         #d97706;
  --amber-bright:  #f59e0b;
  --amber-dim:     #7c3a00;
  --red:           #e05252;
  --red-dim:       #7a1f1f;
  --green:         #38a169;
  --green-dim:     #1a4a2e;
  --blue:          #3d8bcd;
  --purple:        #7c5cbf;
  --font-mono:     'IBM Plex Mono', monospace;
  --font-display:  'Bebas Neue', sans-serif;
  --font-ui:       'Barlow Condensed', sans-serif;
}

html, body {
  width: 100%; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
}

/* ── TOP BAR ─────────────────────────────────────────────── */
#topbar {
  height: 46px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 14px;
  flex-shrink: 0;
}

.tb-logo {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: 3px;
  color: var(--amber);
  text-shadow: 0 0 18px rgba(217,119,6,.5), 0 0 40px rgba(217,119,6,.2);
  user-select: none;
}

.tb-sep {
  width: 1px;
  height: 22px;
  background: var(--border-bright);
}

.tb-case {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.tb-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.pill {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 9px;
  border: 1px solid;
  text-transform: uppercase;
  flex-shrink: 0;
}
.pill-green  { border-color: var(--green); color: var(--green); }
.pill-amber  { border-color: var(--amber); color: var(--amber); }
.pill-red    { border-color: var(--red);   color: var(--red);   }

#clock {
  font-size: 10px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

/* ── BODY LAYOUT ─────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 46px);
}

#main-row {
  display: grid;
  grid-template-columns: 230px 1fr 258px;
  flex: 1;
  min-height: 0;
  border-bottom: 2px solid var(--border-bright);
}

/* ── PANEL CHROME ─────────────────────────────────────────── */
.panel-header {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 9px 13px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ── LEFT: SEARCH ─────────────────────────────────────────── */
#panel-search {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#search-wrap {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#search-input {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-bright);
  color: var(--text-bright);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 10px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
#search-input::placeholder { color: var(--text-dim); }
#search-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 1px var(--amber-dim), 0 0 14px rgba(217,119,6,.2);
}

#results-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  min-height: 0;
}
#results-list::-webkit-scrollbar { width: 3px; }
#results-list::-webkit-scrollbar-track { background: var(--bg-panel); }
#results-list::-webkit-scrollbar-thumb { background: var(--border-bright); }

.result-item {
  padding: 7px 12px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: background .1s, border-color .1s;
}
.result-item:hover   { background: var(--bg-hover); border-left-color: var(--amber-dim); }
.result-item.active  { background: var(--bg-elevated); border-left-color: var(--amber); }

.ri-name {
  display: block;
  color: var(--text-bright);
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}
.ri-tags { display: flex; gap: 5px; flex-wrap: wrap; }

.tag {
  font-family: var(--font-ui);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 1px 5px;
  text-transform: uppercase;
  border: 1px solid transparent;
}
.tag-spe      { border-color: var(--red-dim);    color: var(--red);        background: rgba(224,82,82,.08); }
.tag-exec     { border-color: var(--amber-dim);  color: var(--amber);      background: rgba(217,119,6,.08); }
.tag-core     { border-color: #2a4060;           color: var(--blue);       background: rgba(61,139,205,.06); }
.tag-ext      { border-color: var(--border);     color: var(--text-dim);   background: transparent; }
.tag-offshore { border-color: var(--red-dim);    color: var(--red);        background: rgba(224,82,82,.08); }
.tag-jur      { border-color: var(--border);     color: var(--text-faint); background: transparent; font-size: 8px; }

.result-empty {
  padding: 24px 14px;
  color: var(--text-dim);
  font-size: 11px;
  font-style: italic;
  line-height: 1.7;
}

/* ── CENTER: GRAPH ────────────────────────────────────────── */
#panel-graph {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
  position: relative;
}

#panel-graph .panel-header { background: rgba(7,10,15,.92); }

#graph-svg {
  flex: 1;
  min-height: 0;
  /* dot-grid atmosphere */
  background-image: radial-gradient(circle, rgba(42,63,92,.45) 1px, transparent 1px);
  background-size: 26px 26px;
}

.g-link {
  stroke: var(--border-bright);
  stroke-opacity: .6;
}
.g-node { cursor: pointer; }
.g-node circle {
  transition: filter .2s;
}
.g-node:hover circle { filter: brightness(1.35); }
.g-node.selected circle {
  filter: drop-shadow(0 0 7px currentColor) brightness(1.2);
  stroke: rgba(255,255,255,.3);
  stroke-width: 1.5;
}
.g-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  fill: var(--text);
  pointer-events: none;
  text-anchor: middle;
  dominant-baseline: hanging;
}

#graph-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  pointer-events: none;
}
.gph-icon {
  font-size: 36px;
  opacity: .12;
  filter: grayscale(1);
}
.gph-text {
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ── RIGHT: DETAILS ───────────────────────────────────────── */
#panel-details {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

#details-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  min-height: 0;
}
#details-scroll::-webkit-scrollbar { width: 3px; }
#details-scroll::-webkit-scrollbar-track { background: var(--bg-panel); }
#details-scroll::-webkit-scrollbar-thumb { background: var(--border-bright); }

.details-empty {
  padding: 20px 2px;
  color: var(--text-dim);
  font-size: 11px;
  font-style: italic;
}

.d-section { margin-bottom: 18px; }

.d-section-title {
  font-family: var(--font-ui);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border-dim);
  margin-bottom: 8px;
}

.d-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 4px 0;
  border-bottom: 1px solid rgba(24,32,48,.7);
}
.d-key   { font-size: 10px; color: var(--text-dim); }
.d-val   { font-size: 10px; color: var(--text-bright); font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }
.d-val.danger  { color: var(--red); }
.d-val.safe    { color: var(--green); }
.d-val.warn    { color: var(--amber); }

.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  padding: 8px 10px;
  margin-bottom: 5px;
}
.stat-label {
  font-family: var(--font-ui);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.stat-val {
  font-size: 17px;
  font-weight: 500;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.stat-val.out  { color: var(--red); }
.stat-val.in   { color: var(--green); }
.stat-val.cnt  { color: var(--amber); }

.risk-box {
  background: rgba(224,82,82,.06);
  border: 1px solid var(--red-dim);
  padding: 8px 10px;
  margin-bottom: 14px;
}
.risk-title {
  font-family: var(--font-ui);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.risk-item {
  font-size: 10px;
  color: var(--red);
  opacity: .8;
  padding: 2px 0;
}
.risk-item::before { content: '▸ '; }

.flag-bar {
  border-top: 1px solid var(--border);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
}
.flag-btn {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 11px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 7px;
}
.flag-btn:hover   { border-color: var(--amber); color: var(--amber); background: rgba(217,119,6,.05); }
.flag-btn.f-susp  { border-color: var(--red);   color: var(--red);   background: rgba(224,82,82,.05); }
.flag-btn.f-verif { border-color: var(--green);  color: var(--green); background: rgba(56,161,105,.05); }

/* ── BOTTOM: TIMELINE ─────────────────────────────────────── */
#panel-timeline {
  height: 250px;
  background: var(--bg-panel);
  border-top: 2px solid var(--border-bright);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

#panel-timeline .panel-header {
  flex-shrink: 0;
}

#tl-entity-name {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--amber);
  margin-left: 2px;
}

#tl-legend {
  margin-left: auto;
  display: flex;
  gap: 14px;
  align-items: center;
}
.leg { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-dim); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.leg-line { width: 12px; height: 1px; background: var(--text-faint); }

#timeline-svg {
  flex: 1;
  min-height: 0;
}

/* ── TOOLTIP ──────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: var(--bg-elevated);
  border: 1px solid var(--border-bright);
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
  padding: 9px 11px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  z-index: 9999;
  max-width: 250px;
  display: none;
  line-height: 1.6;
}
.tt-head { font-weight: 600; color: var(--text-bright); margin-bottom: 5px; }
.tt-row  { display: flex; justify-content: space-between; gap: 14px; font-size: 10px; margin-top: 1px; }
.tt-key  { color: var(--text-dim); flex-shrink: 0; }
.tt-val  { color: var(--text); text-align: right; }

/* ── MISC ────────────────────────────────────────────────── */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--border-bright) var(--bg-panel);
}

.axis text { fill: var(--text-dim) !important; font-family: var(--font-mono) !important; font-size: 9px !important; }
.axis line, .axis path { stroke: var(--border) !important; }
.axis .domain { stroke: var(--border-bright) !important; }
</style>
</head>
<body>

<!-- ── TOP BAR ─────────────────────────────────────────────── -->
<div id="topbar">
  <span class="tb-logo">SENTINEL</span>
  <div class="tb-sep"></div>
  <span class="tb-case">Case № ENR-2001 / Forensic Intelligence System</span>
  <div class="tb-right">
    <div class="pill pill-green">ONLINE</div>
    <div class="pill pill-amber" id="pill-txn">— TXN</div>
    <div class="pill pill-red"  id="pill-ent">— ENT</div>
    <div class="tb-sep"></div>
    <span id="clock"></span>
  </div>
</div>

<!-- ── BODY ───────────────────────────────────────────────── -->
<div id="app">
  <div id="main-row">

    <!-- LEFT: SEARCH -->
    <div id="panel-search">
      <div class="panel-header">Entity Search</div>
      <div id="search-wrap">
        <input type="text" id="search-input" placeholder="Name or account ID…" autocomplete="off" spellcheck="false">
      </div>
      <div id="results-list">
        <div class="result-empty">Loading entities…</div>
      </div>
    </div>

    <!-- CENTER: GRAPH -->
    <div id="panel-graph">
      <div class="panel-header">Network Graph</div>
      <svg id="graph-svg"></svg>
      <div id="graph-placeholder">
        <div class="gph-icon">⬡</div>
        <div class="gph-text">Select an entity to map its network</div>
      </div>
    </div>

    <!-- RIGHT: DETAILS -->
    <div id="panel-details">
      <div class="panel-header">Entity Details</div>
      <div id="details-scroll">
        <div class="details-empty">No entity selected</div>
      </div>
      <div class="flag-bar" id="flag-bar" style="display:none">
        <button class="flag-btn" id="btn-susp"  onclick="toggleFlag('suspicious')">⚑ Flag Suspicious</button>
        <button class="flag-btn" id="btn-verif" onclick="toggleFlag('verified')">✓ Mark Verified</button>
        <button class="flag-btn"                onclick="exportEntity()">↓ Export JSON</button>
      </div>
    </div>

  </div>

  <!-- BOTTOM: TIMELINE -->
  <div id="panel-timeline">
    <div class="panel-header">
      Transaction Timeline
      <span id="tl-entity-name"></span>
      <div id="tl-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--red)"></div> Sent</div>
        <div class="leg"><div class="leg-dot" style="background:var(--green)"></div> Received</div>
        <div class="leg" style="margin-right:10px"><div class="leg-line"></div> Event</div>
      </div>
    </div>
    <svg id="timeline-svg"></svg>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let selectedId    = null;
let currentEntity = null;
let flags         = {};   // { accountId: 'suspicious' | 'verified' }
let graphSim      = null;
let graphZoom     = null;
let graphG        = null;

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
}
tickClock();
setInterval(tickClock, 1000);

// ── API HELPERS ───────────────────────────────────────────────────────────────
const api = {
  search:   q   => fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r => r.json()),
  entity:   id  => fetch(`/api/entity/${encodeURIComponent(id)}`).then(r => r.json()),
  network:  id  => fetch(`/api/network/${encodeURIComponent(id)}`).then(r => r.json()),
  timeline: id  => fetch(`/api/timeline/${encodeURIComponent(id)}`).then(r => r.json()),
  health:   ()  => fetch('/api/health').then(r => r.json()),
};

// ── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  const h = await api.health().catch(() => null);
  if (h) {
    document.getElementById('pill-txn').textContent = `${h.transactions.toLocaleString()} TXN`;
    document.getElementById('pill-ent').textContent = `${h.accounts} ENT`;
  }
  const data = await api.search('');
  renderResults(data.results || []);
  initGraph();
})();

// ── SEARCH ────────────────────────────────────────────────────────────────────
let _st = null;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(_st);
  _st = setTimeout(() => api.search(e.target.value).then(d => renderResults(d.results || [])), 180);
});

function entityCategory(acc) {
  if (acc.account_id.startsWith('ACC-SPE')) return 'spe';
  if (acc.account_id.startsWith('ACC-EXE')) return 'exec';
  if (acc.account_id.startsWith('ACC-ENR')) return 'core';
  return 'ext';
}

function renderResults(list) {
  const el = document.getElementById('results-list');
  if (!list.length) {
    el.innerHTML = '<div class="result-empty">No entities found</div>';
    return;
  }

  el.innerHTML = list.map(a => {
    const cat = entityCategory(a);
    const offshore = ['KY','VG'].includes(a.jurisdiction);
    const active = a.account_id === selectedId ? ' active' : '';
    return `
      <div class="result-item${active}" data-id="${a.account_id}" onclick="selectEntity('${a.account_id}')">
        <span class="ri-name">${a.holder_name}</span>
        <div class="ri-tags">
          <span class="tag tag-${cat}">${{spe:'SHELL',exec:'EXEC',core:'ENRON',ext:'EXTERNAL'}[cat]}</span>
          ${offshore ? `<span class="tag tag-offshore">${a.jurisdiction} ⚑</span>` : `<span class="tag tag-jur">${a.jurisdiction}</span>`}
        </div>
      </div>`;
  }).join('');
}

// ── SELECT ENTITY ─────────────────────────────────────────────────────────────
async function selectEntity(id) {
  selectedId = id;

  // Highlight in sidebar
  document.querySelectorAll('.result-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Load all data in parallel
  const [netData, tlData, entData] = await Promise.all([
    api.network(id),
    api.timeline(id),
    api.entity(id),
  ]);

  currentEntity = entData.account;
  renderDetails(entData);
  renderGraph(netData, id);
  renderTimeline(tlData);
}

// ── FORMAT HELPERS ────────────────────────────────────────────────────────────
function fmtAmt(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(0)+'K';
  return n.toFixed(0);
}
function fmtFull(n) {
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

const JUR = { KY:'Cayman Islands', VG:'British Virgin Islands', US:'United States',
              DE:'Germany', GB:'United Kingdom', IN:'India', TX:'Texas' };

// ── DETAILS PANEL ─────────────────────────────────────────────────────────────
function renderDetails(data) {
  const { account: a, stats: s } = data;
  const flag     = flags[a.account_id];
  const offshore = ['KY','VG'].includes(a.jurisdiction);
  const isSPE    = a.account_id.startsWith('ACC-SPE');
  const risks    = [];
  if (isSPE)    risks.push('Special Purpose Entity');
  if (offshore) risks.push(`Offshore jurisdiction (${JUR[a.jurisdiction] || a.jurisdiction})`);

  document.getElementById('details-scroll').innerHTML = `
    ${risks.length ? `
      <div class="risk-box">
        <div class="risk-title">⚑ Risk Indicators</div>
        ${risks.map(r => `<div class="risk-item">${r}</div>`).join('')}
      </div>` : ''}

    <div class="d-section">
      <div class="d-section-title">Identity</div>
      <div class="d-row"><span class="d-key">Name</span>
        <span class="d-val">${a.holder_name}</span></div>
      <div class="d-row"><span class="d-key">Account</span>
        <span class="d-val" style="font-size:9px;letter-spacing:.5px">${a.account_id}</span></div>
      <div class="d-row"><span class="d-key">Type</span>
        <span class="d-val">${a.holder_type}</span></div>
      <div class="d-row"><span class="d-key">Jurisdiction</span>
        <span class="d-val ${offshore ? 'danger' : ''}">${JUR[a.jurisdiction] || a.jurisdiction}</span></div>
      ${a.employer ? `<div class="d-row"><span class="d-key">Employer</span>
        <span class="d-val">${a.employer}</span></div>` : ''}
      <div class="d-row"><span class="d-key">Opened</span>
        <span class="d-val">${a.opened_date}</span></div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Transaction Summary</div>
      <div class="stat-card">
        <div class="stat-label">Total Sent</div>
        <div class="stat-val out">$${fmtAmt(s.total_sent)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Received</div>
        <div class="stat-val in">$${fmtAmt(s.total_received)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Transaction Count</div>
        <div class="stat-val cnt">${s.transaction_count} <span style="font-size:12px;color:var(--text-dim)">(${s.sent_count} out / ${s.received_count} in)</span></div>
      </div>
    </div>

    ${flag ? `<div class="d-section">
      <div class="d-section-title">Status</div>
      <div class="d-row"><span class="d-key">Flagged as</span>
        <span class="d-val ${flag==='suspicious'?'danger':'safe'}">${flag.toUpperCase()}</span></div>
    </div>` : ''}
  `;

  document.getElementById('flag-bar').style.display = '';
  document.getElementById('btn-susp').className  = 'flag-btn' + (flag === 'suspicious' ? ' f-susp'  : '');
  document.getElementById('btn-verif').className = 'flag-btn' + (flag === 'verified'   ? ' f-verif' : '');
}

function toggleFlag(type) {
  if (!selectedId) return;
  flags[selectedId] = flags[selectedId] === type ? undefined : type;
  if (currentEntity) renderDetails({ account: currentEntity,
    stats: { total_sent: 0, total_received: 0, transaction_count: 0, sent_count: 0, received_count: 0 }});
  api.entity(selectedId).then(renderDetails);
}

function exportEntity() {
  if (!selectedId) return;
  api.entity(selectedId).then(d => {
    const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `${selectedId}.json`; a.click();
  });
}

// ── NETWORK GRAPH ─────────────────────────────────────────────────────────────
function nodeColor(n) {
  if (n.account_id.startsWith('ACC-SPE')) return '#e05252';
  if (n.account_id.startsWith('ACC-EXE')) return '#f59e0b';
  if (n.account_id.startsWith('ACC-ENR')) return '#d97706';
  return '#3d6080';
}

function nodeRadius(n) {
  const vol = n.total_volume || 0;
  return Math.max(6, Math.min(26, Math.sqrt(vol / 8e5) + 6));
}

function initGraph() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  graphG = svg.append('g');
  graphZoom = d3.zoom().scaleExtent([0.25, 5])
    .on('zoom', ev => graphG.attr('transform', ev.transform));
  svg.call(graphZoom);
}

function renderGraph(data, centerId) {
  const { nodes, edges } = data;
  document.getElementById('graph-placeholder').style.display = 'none';

  const svgEl = document.getElementById('graph-svg');
  const W = svgEl.clientWidth  || 600;
  const H = svgEl.clientHeight || 400;

  if (graphSim) graphSim.stop();
  graphG.selectAll('*').remove();

  const nodeById = new Map(nodes.map(n => [n.account_id, n]));

  const links = edges.map(e => ({
    source: e.source,
    target: e.target,
    count:  e.count,
    total:  e.total,
  }));

  // Links
  const linkSel = graphG.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'g-link')
    .attr('stroke-width', d => Math.max(0.5, Math.min(4, Math.log2(d.count + 1))));

  // Nodes
  const nodeSel = graphG.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', d => 'g-node' + (d.account_id === centerId ? ' selected' : ''))
    .attr('data-id', d => d.account_id)
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) graphSim.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end',   (ev, d) => { if (!ev.active) graphSim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('click', (ev, d) => { ev.stopPropagation(); selectEntity(d.account_id); })
    .on('mouseover', (ev, d) => {
      showTooltip(ev, `
        <div class="tt-head">${d.holder_name}</div>
        <div class="tt-row"><span class="tt-key">Account</span><span class="tt-val">${d.account_id}</span></div>
        <div class="tt-row"><span class="tt-key">Jurisdiction</span><span class="tt-val">${JUR[d.jurisdiction]||d.jurisdiction}</span></div>
        <div class="tt-row"><span class="tt-key">Volume</span><span class="tt-val">$${fmtAmt(d.total_volume)}</span></div>
        <div class="tt-row"><span class="tt-key">Transactions</span><span class="tt-val">${d.transaction_count}</span></div>
      `);
    })
    .on('mousemove', ev => posTooltip(ev))
    .on('mouseout',  () => hideTooltip());

  nodeSel.append('circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => nodeColor(d))
    .attr('fill-opacity', .85)
    .attr('color', d => nodeColor(d));   // used by .selected drop-shadow

  nodeSel.append('text')
    .attr('class', 'g-label')
    .attr('dy', d => nodeRadius(d) + 4)
    .text(d => d.holder_name.length > 20 ? d.holder_name.slice(0, 18) + '…' : d.holder_name);

  // Force simulation
  graphSim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.account_id).distance(95).strength(.55))
    .force('charge', d3.forceManyBody().strength(-320))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 18))
    .on('tick', () => {
      linkSel
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // Reset zoom
  d3.select('#graph-svg')
    .transition().duration(350)
    .call(graphZoom.transform, d3.zoomIdentity);
}

// ── TIMELINE ─────────────────────────────────────────────────────────────────
const ENRON_EVENTS = [
  { date: '2001-08-14', label: 'Skilling resigns' },
  { date: '2001-10-16', label: 'Restatement' },
  { date: '2001-10-22', label: 'SEC opens inquiry' },
  { date: '2001-11-08', label: 'Restates 97–00' },
  { date: '2001-12-02', label: 'Bankruptcy' },
];

function renderTimeline(data) {
  const { transactions } = data;

  document.getElementById('tl-entity-name').textContent =
    currentEntity ? `— ${currentEntity.holder_name}` : '';

  const svgEl  = document.getElementById('timeline-svg');
  const svg    = d3.select('#timeline-svg');
  svg.selectAll('*').remove();

  if (!transactions.length) return;

  const W  = svgEl.clientWidth  || 900;
  const H  = svgEl.clientHeight || 160;
  const m  = { top: 18, right: 18, bottom: 28, left: 66 };
  const iW = W - m.left - m.right;
  const iH = H - m.top  - m.bottom;

  const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);

  const xScale = d3.scaleTime()
    .domain([new Date('1999-01-01'), new Date('2002-04-01')])
    .range([0, iW]);

  const maxAmt = d3.max(transactions, d => d.amount) || 1;
  const yScale = d3.scaleLinear()
    .domain([0, maxAmt * 1.08])
    .range([iH, 0]);

  const rScale = d3.scaleSqrt()
    .domain([0, maxAmt])
    .range([2.5, 9]);

  // Grid
  g.append('g').call(
    d3.axisLeft(yScale).tickSize(-iW).tickFormat('').ticks(4)
  ).call(g2 => {
    g2.select('.domain').remove();
    g2.selectAll('line').attr('stroke', 'var(--border-dim)').attr('stroke-dasharray', '3,4');
  });

  // Axes
  g.append('g').attr('transform', `translate(0,${iH})`).attr('class','axis')
    .call(d3.axisBottom(xScale).ticks(d3.timeYear.every(1)).tickFormat(d3.timeFormat('%Y')));

  g.append('g').attr('class','axis')
    .call(d3.axisLeft(yScale).ticks(4).tickFormat(d => `$${fmtAmt(d)}`));

  // Enron event markers
  ENRON_EVENTS.forEach(ev => {
    const x = xScale(new Date(ev.date));
    if (x < 0 || x > iW) return;
    g.append('line')
      .attr('x1', x).attr('x2', x).attr('y1', 0).attr('y2', iH)
      .attr('stroke', 'var(--text-faint)').attr('stroke-width', 1)
      .attr('stroke-dasharray', '4,3');
    g.append('text')
      .attr('x', x + 3).attr('y', 8)
      .attr('fill', 'var(--text-faint)')
      .style('font-family', 'var(--font-mono)').style('font-size', '8px')
      .text(ev.label);
  });

  // Dots
  g.selectAll('circle.txn')
    .data(transactions)
    .join('circle')
    .attr('class', 'txn')
    .attr('cx', d => xScale(new Date(d.date)))
    .attr('cy', d => yScale(d.amount))
    .attr('r',  d => rScale(d.amount))
    .attr('fill',         d => d.direction === 'sent' ? 'var(--red)'   : 'var(--green)')
    .attr('fill-opacity', .7)
    .attr('stroke',       d => d.direction === 'sent' ? '#ef8080' : '#68d391')
    .attr('stroke-width', .5)
    .style('cursor', 'pointer')
    .on('mouseover', (ev, d) => {
      const counterparty = d.direction === 'sent' ? d.receiver_name : d.sender_name;
      showTooltip(ev, `
        <div class="tt-head">${d.direction === 'sent' ? '→' : '←'} ${counterparty}</div>
        <div class="tt-row"><span class="tt-key">Amount</span>
          <span class="tt-val" style="color:${d.direction==='sent'?'var(--red)':'var(--green)'}">${fmtFull(d.amount)}</span></div>
        <div class="tt-row"><span class="tt-key">Date</span><span class="tt-val">${d.date}</span></div>
        <div class="tt-row"><span class="tt-key">Type</span><span class="tt-val">${d.transaction_type}</span></div>
        <div class="tt-row"><span class="tt-key">Ref</span><span class="tt-val" style="max-width:140px;word-break:break-all">${d.description}</span></div>
      `);
    })
    .on('mousemove', ev => posTooltip(ev))
    .on('mouseout',  () => hideTooltip());
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
function showTooltip(ev, html) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = html;
  tt.style.display = 'block';
  posTooltip(ev);
}
function posTooltip(ev) {
  const tt = document.getElementById('tooltip');
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + 260 > window.innerWidth)  x = ev.clientX - 264;
  if (y + 160 > window.innerHeight) y = ev.clientY - 164;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}
</script>
